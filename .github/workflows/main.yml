name: BTST Stock Screener — India + USA

# ─────────────────────────────────────────────────────────────────
# SCHEDULE STRATEGY
#
#  Two auto-runs per weekday:
#
#  1) India run  — 3:15 PM IST  = 09:45 UTC  (near NSE market close)
#  2) USA run    — 3:30 PM EST  = 20:30 UTC  (near NYSE market close)
#
#  Manual trigger available from the GitHub Actions tab.
# ─────────────────────────────────────────────────────────────────

on:
  schedule:
    # ── India: 3:15 PM IST (Mon–Fri) ──────────────────────────────
    - cron: "45 9 * * 1-5"
    # ── USA: 3:30 PM EST = 20:30 UTC (Mon–Fri) ────────────────────
    - cron: "30 20 * * 1-5"

  # ── Manual trigger — pick which market to scan ────────────────
  workflow_dispatch:
    inputs:
      market:
        description: "Which market to scan?"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - india
          - usa

# ─────────────────────────────────────────────────────────────────
# SHARED SETUP — reusable across all jobs via a composite action
# ─────────────────────────────────────────────────────────────────
# NOTE: Dependencies are installed inline below — no requirements.txt needed.
#       Packages: yfinance, pandas, pandas-ta, tabulate, colorama, requests

# ─────────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────────
jobs:

  # ══════════════════════════════════════════════════════════════
  # JOB 1 — INDIA  (auto at 09:45 UTC  OR  manual india/both)
  # ══════════════════════════════════════════════════════════════
  india-screener:
    name: 🇮🇳 India — Nifty 100 BTST Scan
    runs-on: ubuntu-latest

    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '45 9 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.market == 'india' || github.event.inputs.market == 'both'))

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: ⬇️  Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Python setup (no cache — avoids requirements.txt lookup)
      - name: 🐍  Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install all dependencies inline ───────────────────────
      - name: 📦  Install Dependencies
        run: |
          pip install --upgrade pip
          pip install \
            yfinance>=0.2.36 \
            pandas>=2.0.0 \
            pandas-ta>=0.3.14b \
            tabulate>=0.9.0 \
            colorama>=0.4.6 \
            requests>=2.31.0

      # ── 4. Run India screener ─────────────────────────────────────
      - name: 🇮🇳  Run India BTST Screener
        run: python btst_screener.py --india

      # ── 5. Upload artifacts (downloadable from Actions UI) ────────
      - name: 📤  Upload India Reports
        uses: actions/upload-artifact@v4
        with:
          name: btst-india-${{ github.run_id }}
          path: |
            btst_india_*.csv
            btst_india_full_*.csv
            btst_report_*.html
          retention-days: 7

      # ── 6. Commit reports into repo under reports/ folder ─────────
      - name: 💾  Commit India Reports to Repo
        run: |
          mkdir -p reports
          cp btst_india_*.csv      reports/ 2>/dev/null || true
          cp btst_india_full_*.csv reports/ 2>/dev/null || true
          cp btst_report_*.html    reports/ 2>/dev/null || true
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ || true
          git diff --cached --quiet || \
            git commit -m "📊 [India] BTST Report $(TZ='Asia/Kolkata' date +'%Y-%m-%d %I:%M %p IST')"
          git push || true

  # ══════════════════════════════════════════════════════════════
  # JOB 2 — USA  (auto at 20:30 UTC  OR  manual usa/both)
  # ══════════════════════════════════════════════════════════════
  usa-screener:
    name: 🇺🇸 USA — S&P 500 Top 100 BTST Scan
    runs-on: ubuntu-latest

    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 20 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.market == 'usa' || github.event.inputs.market == 'both'))

    steps:
      - name: ⬇️  Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍  Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦  Install Dependencies
        run: |
          pip install --upgrade pip
          pip install \
            yfinance>=0.2.36 \
            pandas>=2.0.0 \
            pandas-ta>=0.3.14b \
            tabulate>=0.9.0 \
            colorama>=0.4.6 \
            requests>=2.31.0

      - name: 🇺🇸  Run USA BTST Screener
        run: python btst_screener.py --usa

      - name: 📤  Upload USA Reports
        uses: actions/upload-artifact@v4
        with:
          name: btst-usa-${{ github.run_id }}
          path: |
            btst_usa_*.csv
            btst_usa_full_*.csv
            btst_report_*.html
          retention-days: 7

      - name: 💾  Commit USA Reports to Repo
        run: |
          mkdir -p reports
          cp btst_usa_*.csv      reports/ 2>/dev/null || true
          cp btst_usa_full_*.csv reports/ 2>/dev/null || true
          cp btst_report_*.html  reports/ 2>/dev/null || true
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ || true
          git diff --cached --quiet || \
            git commit -m "📊 [USA] BTST Report $(TZ='America/New_York' date +'%Y-%m-%d %I:%M %p EST')"
          git push || true

  # ══════════════════════════════════════════════════════════════
  # JOB 3 — BOTH  (manual "both" — scans India + USA together)
  # ══════════════════════════════════════════════════════════════
  both-screener:
    name: 🌏 Both Markets — Full BTST Scan
    runs-on: ubuntu-latest

    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.market == 'both'

    steps:
      - name: ⬇️  Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍  Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦  Install Dependencies
        run: |
          pip install --upgrade pip
          pip install \
            yfinance>=0.2.36 \
            pandas>=2.0.0 \
            pandas-ta>=0.3.14b \
            tabulate>=0.9.0 \
            colorama>=0.4.6 \
            requests>=2.31.0

      - name: 🌏  Run Both Markets Screener
        run: python btst_screener.py

      - name: 📤  Upload All Reports
        uses: actions/upload-artifact@v4
        with:
          name: btst-both-${{ github.run_id }}
          path: |
            btst_india_*.csv
            btst_india_full_*.csv
            btst_usa_*.csv
            btst_usa_full_*.csv
            btst_report_*.html
          retention-days: 7

      - name: 💾  Commit All Reports to Repo
        run: |
          mkdir -p reports
          cp btst_*.csv         reports/ 2>/dev/null || true
          cp btst_report_*.html reports/ 2>/dev/null || true
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ || true
          git diff --cached --quiet || \
            git commit -m "📊 [Both] BTST Report $(date +'%Y-%m-%d')"
          git push || true
