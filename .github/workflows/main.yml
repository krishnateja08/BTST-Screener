# ══════════════════════════════════════════════════════════════
#  BTST Screener — Single Unified Workflow
#
#  Triggers:
#    1. Schedule  — twice daily at market close (IST + EST)
#    2. Push      — whenever btst_screener.py is saved/updated
#    3. Manual    — via "Run workflow" button in Actions tab
#
#  Flow:
#    scan-india ──┐
#                 ├──► commit (generates HTML + pushes ONCE)
#    scan-usa   ──┘
# ══════════════════════════════════════════════════════════════

name: BTST Screener

on:
  schedule:
    - cron: '0 10 * * 1-5'   # 3:30 PM IST — India market close
    - cron: '0 21 * * 1-5'   # 4:00 PM EST — USA market close

  # Auto-run full scan when you save/push the script or workflow
  push:
    branches:
      - main
    paths:
      - 'btst_screener.py'                     # script updated → full scan
      - '.github/workflows/btst_screener.yml'  # workflow updated → test it

  workflow_dispatch:   # manual trigger from Actions tab

# Prevent two runs from pushing at the same time
concurrency:
  group: btst-deploy
  cancel-in-progress: false   # queue, don't cancel

jobs:

  # ── JOB 1: Scan India (parallel) ────────────────────────────
  scan-india:
    name: 🇮🇳 Scan India (Nifty 100)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas pandas-ta requests tabulate colorama

      - name: Run India scan
        run: python btst_screener.py --india

      - name: Upload India scan output
        uses: actions/upload-artifact@v4
        with:
          name: scan-india
          path: |
            btst_india_*.csv
            btst_india_full_*.csv
            btst_india_meta_*.json
          retention-days: 7

  # ── JOB 2: Scan USA (parallel) ──────────────────────────────
  scan-usa:
    name: 🇺🇸 Scan USA (S&P 500 Top 100)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas pandas-ta requests tabulate colorama

      - name: Run USA scan
        run: python btst_screener.py --usa

      - name: Upload USA scan output
        uses: actions/upload-artifact@v4
        with:
          name: scan-usa
          path: |
            btst_usa_*.csv
            btst_usa_full_*.csv
            btst_usa_meta_*.json
          retention-days: 7

  # ── JOB 3: Combine results, generate HTML, commit ONCE ──────
  commit:
    name: 📝 Generate Report & Commit
    runs-on: ubuntu-latest
    needs: [scan-india, scan-usa]   # waits for BOTH parallel jobs
    if: always()                    # runs even if one market is closed/failed

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas pandas-ta requests tabulate colorama

      - name: Download India scan output
        uses: actions/download-artifact@v4
        with:
          name: scan-india
          path: .
        continue-on-error: true   # graceful if India scan failed (holiday)

      - name: Download USA scan output
        uses: actions/download-artifact@v4
        with:
          name: scan-usa
          path: .
        continue-on-error: true   # graceful if USA scan failed

      - name: Generate combined HTML report
        run: python btst_screener.py --html-only

      - name: Copy outputs to docs/
        run: |
          mkdir -p docs
          cp btst_india_*.csv        docs/ 2>/dev/null || true
          cp btst_india_full_*.csv   docs/ 2>/dev/null || true
          cp btst_india_meta_*.json  docs/ 2>/dev/null || true
          cp btst_usa_*.csv          docs/ 2>/dev/null || true
          cp btst_usa_full_*.csv     docs/ 2>/dev/null || true
          cp btst_usa_meta_*.json    docs/ 2>/dev/null || true
          cp btst_report_*.html      docs/ 2>/dev/null || true
          cp index.html              docs/ 2>/dev/null || true

      - name: Commit and push to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "✅ No changes to commit — report unchanged"
            exit 0
          fi
          DATE=$(TZ='Asia/Kolkata' date +'%Y-%m-%d %I:%M %p IST')
          git commit -m "📊 BTST Report ${DATE} — India + USA"
          git push origin main
