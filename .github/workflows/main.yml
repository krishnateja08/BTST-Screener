# ══════════════════════════════════════════════════════════════
#  BTST Screener — Single Unified Workflow
#
#  Flow:
#    scan-india ──┐
#                 ├──► commit (generates HTML + pushes ONCE)
#    scan-usa   ──┘
#
#  Runs twice daily:
#    • 10:00 UTC  →  3:30 PM IST  (India market close)
#    • 21:00 UTC  →  4:00 PM EST  (USA market close)
#
#  No more push conflicts — only the final commit job touches git.
# ══════════════════════════════════════════════════════════════

name: BTST Screener

on:
  schedule:
    - cron: '0 10 * * 1-5'   # 3:30 PM IST — India market close
    - cron: '0 21 * * 1-5'   # 4:00 PM EST — USA market close
  workflow_dispatch:           # allow manual trigger from Actions tab

# Prevent two scheduled runs from pushing at the same time
concurrency:
  group: btst-deploy
  cancel-in-progress: false   # queue, don't cancel

jobs:

  # ── JOB 1: Scan India (parallel) ────────────────────────────
  scan-india:
    name: 🇮🇳 Scan India (Nifty 100)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # No cache — no requirements.txt in repo

      - name: Install dependencies
        run: pip install yfinance pandas pandas-ta requests tabulate colorama

      - name: Run India scan
        run: python btst_screener.py --india

      - name: Upload India scan output
        uses: actions/upload-artifact@v4
        with:
          name: scan-india
          path: |
            btst_india_*.csv
            btst_india_full_*.csv
            btst_india_meta_*.json
          retention-days: 7

  # ── JOB 2: Scan USA (parallel) ──────────────────────────────
  scan-usa:
    name: 🇺🇸 Scan USA (S&P 500 Top 100)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # No cache — no requirements.txt in repo

      - name: Install dependencies
        run: pip install yfinance pandas pandas-ta requests tabulate colorama

      - name: Run USA scan
        run: python btst_screener.py --usa

      - name: Upload USA scan output
        uses: actions/upload-artifact@v4
        with:
          name: scan-usa
          path: |
            btst_usa_*.csv
            btst_usa_full_*.csv
            btst_usa_meta_*.json
          retention-days: 7

  # ── JOB 3: Combine results, generate HTML, commit ONCE ──────
  commit:
    name: 📝 Generate Report & Commit
    runs-on: ubuntu-latest
    needs: [scan-india, scan-usa]   # waits for BOTH parallel jobs
    # Run commit even if one scan failed (e.g. market closed / holiday)
    if: always()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas pandas-ta requests tabulate colorama

      # Download both scan artifacts into working directory
      - name: Download India scan output
        uses: actions/download-artifact@v4
        with:
          name: scan-india
          path: .
        continue-on-error: true   # graceful if India scan failed (holiday etc.)

      - name: Download USA scan output
        uses: actions/download-artifact@v4
        with:
          name: scan-usa
          path: .
        continue-on-error: true   # graceful if USA scan failed

      # Generate combined HTML from the saved CSVs — no yfinance calls needed
      - name: Generate combined HTML report
        run: python btst_screener.py --html-only

      # Copy all outputs into docs/ (GitHub Pages source)
      - name: Copy outputs to docs/
        run: |
          mkdir -p docs
          cp btst_india_*.csv        docs/ 2>/dev/null || true
          cp btst_india_full_*.csv   docs/ 2>/dev/null || true
          cp btst_india_meta_*.json  docs/ 2>/dev/null || true
          cp btst_usa_*.csv          docs/ 2>/dev/null || true
          cp btst_usa_full_*.csv     docs/ 2>/dev/null || true
          cp btst_usa_meta_*.json    docs/ 2>/dev/null || true
          cp btst_report_*.html      docs/ 2>/dev/null || true
          cp index.html              docs/ 2>/dev/null || true

      # Single git commit + push — no more conflicts!
      - name: Commit and push to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "✅ No changes to commit — report unchanged"
            exit 0
          fi
          DATE=$(TZ='Asia/Kolkata' date +'%Y-%m-%d %I:%M %p IST')
          git commit -m "📊 BTST Report ${DATE} — India + USA"
          git push origin main
