name: BTST Stock Screener — India + USA

on:
  schedule:
    - cron: "45 9 * * 1-5"
    - cron: "30 20 * * 1-5"

  workflow_dispatch:
    inputs:
      market:
        description: "Which market to scan?"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - india
          - usa

jobs:

  india-screener:
    name: 🇮🇳 India — Nifty 100 BTST Scan
    runs-on: ubuntu-latest
    permissions:
      contents: write

    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '45 9 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.market == 'india' || github.event.inputs.market == 'both'))

    steps:
      - name: ⬇️  Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍  Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦  Install Dependencies
        run: |
          pip install --upgrade pip
          pip install \
            yfinance>=0.2.36 \
            pandas>=2.0.0 \
            pandas-ta>=0.3.14b \
            tabulate>=0.9.0 \
            colorama>=0.4.6 \
            requests>=2.31.0

      - name: 🇮🇳  Run India BTST Screener
        run: python btst_screener.py --india

      - name: ✅  Verify HTML Report Exists
        run: |
          HTML=$(ls btst_report_*.html 2>/dev/null | head -1)
          if [ -z "$HTML" ]; then
            echo "❌ ERROR: btst_report_*.html was NOT generated!"
            exit 1
          fi
          echo "✅ HTML found: $HTML  ($(wc -c < "$HTML") bytes)"
          ls -lh btst_*.html btst_*.csv 2>/dev/null || true

      - name: 📤  Upload India Reports
        uses: actions/upload-artifact@v4
        with:
          name: btst-india-${{ github.run_id }}
          path: |
            btst_india_*.csv
            btst_india_full_*.csv
            btst_report_*.html
          retention-days: 7

      - name: 💾  Commit India Reports to Repo
        run: |
          mkdir -p docs
          cp btst_india_*.csv      docs/ 2>/dev/null || true
          cp btst_india_full_*.csv docs/ 2>/dev/null || true
          cp btst_report_*.html    docs/ 2>/dev/null || true
          LATEST=$(ls -t docs/btst_report_*.html 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          if [ -n "$LATEST" ]; then
            echo "<meta http-equiv=\"refresh\" content=\"0; url=$LATEST\">" > docs/index.html
            echo "📄 index.html → $LATEST"
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "ℹ️  No changes to commit."
          else
            git commit -m "📊 [India] BTST Report $(TZ='Asia/Kolkata' date +'%Y-%m-%d %I:%M %p IST')"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && echo "✅ Push succeeded" && break
              echo "⚠️  Push attempt $i failed, retrying in 5s..."
              sleep 5
            done
          fi

  usa-screener:
    name: 🇺🇸 USA — S&P 500 Top 100 BTST Scan
    runs-on: ubuntu-latest
    permissions:
      contents: write

    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 20 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.market == 'usa' || github.event.inputs.market == 'both'))

    steps:
      - name: ⬇️  Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍  Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦  Install Dependencies
        run: |
          pip install --upgrade pip
          pip install \
            yfinance>=0.2.36 \
            pandas>=2.0.0 \
            pandas-ta>=0.3.14b \
            tabulate>=0.9.0 \
            colorama>=0.4.6 \
            requests>=2.31.0

      - name: 🇺🇸  Run USA BTST Screener
        run: python btst_screener.py --usa

      - name: ✅  Verify HTML Report Exists
        run: |
          HTML=$(ls btst_report_*.html 2>/dev/null | head -1)
          if [ -z "$HTML" ]; then
            echo "❌ ERROR: btst_report_*.html was NOT generated!"
            exit 1
          fi
          echo "✅ HTML found: $HTML  ($(wc -c < "$HTML") bytes)"
          ls -lh btst_*.html btst_*.csv 2>/dev/null || true

      - name: 📤  Upload USA Reports
        uses: actions/upload-artifact@v4
        with:
          name: btst-usa-${{ github.run_id }}
          path: |
            btst_usa_*.csv
            btst_usa_full_*.csv
            btst_report_*.html
          retention-days: 7

      - name: 💾  Commit USA Reports to Repo
        run: |
          mkdir -p docs
          cp btst_usa_*.csv      docs/ 2>/dev/null || true
          cp btst_usa_full_*.csv docs/ 2>/dev/null || true
          cp btst_report_*.html  docs/ 2>/dev/null || true
          LATEST=$(ls -t docs/btst_report_*.html 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          if [ -n "$LATEST" ]; then
            echo "<meta http-equiv=\"refresh\" content=\"0; url=$LATEST\">" > docs/index.html
            echo "📄 index.html → $LATEST"
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "ℹ️  No changes to commit."
          else
            git commit -m "📊 [USA] BTST Report $(TZ='America/New_York' date +'%Y-%m-%d %I:%M %p EST')"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && echo "✅ Push succeeded" && break
              echo "⚠️  Push attempt $i failed, retrying in 5s..."
              sleep 5
            done
          fi
